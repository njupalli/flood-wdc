<!DOCTYPE html>
<html>

<head>
    <title>Flood Prediction Tableau Connector</title>
    <script src="https://connectors.tableau.com/libs/tableauwdc-2.3.latest.js"></script>
</head>

<body>

<h2>Flood Prediction Connector</h2>
<button id="getData">Get Flood Data</button>

<script>

var connector = tableau.makeConnector();

connector.getSchema = function (schemaCallback) {

    var cols = [
        { id: "lat", dataType: tableau.dataTypeEnum.float },
        { id: "lon", dataType: tableau.dataTypeEnum.float },
        { id: "elevation", dataType: tableau.dataTypeEnum.float },
        { id: "rainfall", dataType: tableau.dataTypeEnum.float },
        { id: "flood_probability", dataType: tableau.dataTypeEnum.float }
    ];

    var tableSchema = {
        id: "floodPredictions",
        columns: cols
    };

    schemaCallback([tableSchema]);
};

connector.getData = function (table, doneCallback) {

    fetch("http://44.214.136.171:8000/predict_grid")
        .then(response => response.json())
        .then(data => {

            var tableData = [];

            data.forEach(function (item) {
                tableData.push({
                    "lat": item.lat,
                    "lon": item.lon,
                    "elevation": item.elevation,
                    "rainfall": item.rainfall,
                    "flood_probability": item.flood_probability
                });
            });

            table.appendRows(tableData);
            doneCallback();
        })
        .catch(error => {
            console.error("Error:", error);
        });
};

tableau.registerConnector(connector);

document.getElementById("getData").onclick = function () {
    tableau.connectionName = "Flood Prediction Data";
    tableau.submitConnector();
};

</script>

</body>
</html>
